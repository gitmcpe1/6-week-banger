async function calcMacros(description){
  const apiKey=localStorage.getItem("api-key")||"";
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,system:SYSTEM_PROMPT,messages:[{role:"user",content:description}]}),
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return JSON.parse((d.content?.map(b=>b.text||"").join("")||"").replace(/```json|```/g,"").trim());
}

const C={bg:"#0a0e17",card:"#111827",border:"#1e2d40",accent:"#00d4aa",amber:"#f59e0b",purple:"#a78bfa",red:"#ff6b6b",text:"#e2e8f0",muted:"#8a9ab0",faint:"#2a3a4e",blue:"#38bdf8",orange:"#fb923c"};
const getTodayKey=()=>new Date().toISOString().split("T")[0];

function getProgrammeWeek(startDate){
  if(!startDate)return null;
  const diff=Math.floor((new Date(getTodayKey())-new Date(startDate))/(1000*60*60*24));
  const week=Math.floor(diff/7)+1;
  return week>=1&&week<=6?week:null;
}

function getTodaySession(startDate){
  if(!startDate)return null;
  const week=getProgrammeWeek(startDate);
  if(!week)return null;
  const dow=new Date().getDay();
  const phase=week<=2?1:week<=4?2:3;
  const phaseKey=`phase${phase}`;
  if(dow===1) return{...SESSIONS.A,exercises:SESSIONS.A[phaseKey],week,phase};
  if(dow===3) return{...SESSIONS.B,exercises:SESSIONS.B[phaseKey],week,phase};
  if(dow===4) return{...SESSIONS.C,exercises:SESSIONS.C[phaseKey],week,phase};
  const dayMap={2:"Tue",5:"Fri",6:"Sat"};
  const dayStr=dayMap[dow];
  if(dayStr){const cardio=CARDIO_SESSIONS.find(s=>s.week===week&&s.day===dayStr);if(cardio)return{...cardio,type:"cardio",exercises:[]};}
  return{name:"Rest / Recovery",emoji:"😴",type:"rest",notes:"Active recovery, mobility work, or full rest.",exercises:[]};
}

const MacroBar=({label,current,target,color})=>{
  const pct=Math.min((current/target)*100,100);const over=current>target;
  return(<div style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:C.muted}}>{label}</span><span style={{fontSize:11,fontWeight:700,color:over?C.red:C.text}}>{Math.round(current)}<span style={{color:C.faint,fontWeight:400}}>/{target}g</span></span></div><div style={{height:5,background:C.border,borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:over?C.red:color,borderRadius:99,transition:"width 0.5s"}}/></div></div>);
};
const Ring=({current,target,color=C.accent,size=120,label="kcal"})=>{
  const r=size/2-8;const circ=2*Math.PI*r;const pct=Math.min(current/target,1);const over=current>target;
  return(<div style={{position:"relative",width:size,height:size,flexShrink:0}}><svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth="9"/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={over?C.red:color} strokeWidth="9" strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.6s",filter:`drop-shadow(0 0 5px ${over?C.red:color})`}}/></svg><div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:size*0.17,fontWeight:800,color:over?C.red:C.text,lineHeight:1}}>{Math.round(current)}</span><span style={{fontSize:9,color:C.faint,marginTop:2}}>/ {target}</span><span style={{fontSize:8,color:C.faint,letterSpacing:1,textTransform:"uppercase"}}>{label}</span></div></div>);

  const loadMeals=useCallback(async()=>{setLoading(true);try{const d=await sbGet("meals",`&date=eq.${todayKey}`);setMeals(d||[]);}catch{}setLoading(false);},[todayKey]);
  useEffect(()=>{loadMeals();},[loadMeals]);
  const totals=meals.reduce((a,m)=>({calories:a.calories+(parseFloat(m.data?.calories)||0),protein:a.protein+(parseFloat(m.data?.protein)||0),carbs:a.carbs+(parseFloat(m.data?.carbs)||0),fat:a.fat+(parseFloat(m.data?.fat)||0)}),{calories:0,protein:0,carbs:0,fat:0});
  const addMeal=async(meal)=>{try{const r=await sbPost("meals",{date:todayKey,data:meal});if(r)setMeals(p=>[...p,...(Array.isArray(r)?r:[r])]);}catch{}};
  const delMeal=async(id)=>{try{await sbDelete("meals",`id=eq.${id}`);setMeals(p=>p.filter(m=>m.id!==id));}catch{}};
  const handleCalc=async()=>{if(!inputText.trim())return;setIsCalc(true);setError("");setResult(null);try{setResult(await calcMacros(inputText));}catch(e){setError("Couldn't calculate — check your API key in Settings or try rephrasing.");}setIsCalc(false);};
  const handleConfirm=async()=>{if(!result)return;await addMeal(result);setShowInput(false);setInputText("");setResult(null);};
  const startVoice=()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert("Use Safari on iPhone for voice input");return;}const r=new SR();r.continuous=false;r.interimResults=true;r.lang="en-IE";r.onstart=()=>setIsListening(true);r.onresult=e=>setInputText(Array.from(e.results).map(r=>r[0].transcript).join(""));r.onend=()=>setIsListening(false);r.onerror=()=>setIsListening(false);r.start();recRef.current=r;};
  const stopVoice=()=>{recRef.current?.stop();setIsListening(false);};
  const isToday=todayKey===getTodayKey();
  const changeDay=dir=>{const d=new Date(todayKey+"T12:00:00");d.setDate(d.getDate()+dir);setTodayKey(d.toISOString().split("T")[0]);};
  const rem={calories:targets.calories-totals.calories,protein:targets.protein-totals.protein};
  const isTrainingDay=()=>{const dow=new Date().getDay();return[1,3,4].includes(dow);};
  return(
    <div>
      <div style={{background:"#00d4aa11",border:`1px solid #00d4aa33`,borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",gap:10,alignItems:"center"}}>
        <span style={{fontSize:18}}>💊</span>
        <div style={{fontSize:12,color:C.muted}}><span style={{color:C.accent,fontWeight:700}}>Daily:</span> 5g creatine with Meal 1 · Vitamin D with a fat-containing meal{isTrainingDay()&&<span style={{color:C.amber,fontWeight:700}}> · Training Day — carbs up</span>}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button onClick={()=>changeDay(-1)} style={{background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer"}}>‹</button>
        <span style={{fontSize:13,fontWeight:700,color:isToday?C.accent:C.text}}>{isToday?"Today":new Date(todayKey+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</span>
        <button onClick={()=>changeDay(1)} style={{background:"none",border:"none",color:isToday?C.border:C.muted,fontSize:20,cursor:"pointer"}}>›</button>
      </div>
      <Card style={{marginBottom:12}}>
        <div style={{display:"flex",gap:16,alignItems:"center",marginBottom:14}}>
          <Ring current={totals.calories} target={targets.calories}/>
          <div style={{flex:1}}><MacroBar label="Protein" current={totals.protein} target={targets.protein} color={C.accent}/><MacroBar label="Carbs" current={totals.carbs} target={targets.carbs} color={C.amber}/><MacroBar label="Fat" current={totals.fat} target={targets.fat} color={C.purple}/></div>
        </div>
        <div style={{display:"flex",paddingTop:12,borderTop:`1px solid ${C.border}`,gap:8}}>
          {[{label:"Remaining",val:`${Math.abs(Math.round(rem.calories))} kcal ${rem.calories<0?"over":"left"}`,color:rem.calories<0?C.red:C.accent},{label:"Protein",val:rem.protein<=0?"✓ Hit!":`${Math.round(rem.protein)}g left`,color:rem.protein<=0?C.accent:C.text},{label:"Meals",val:`${meals.length} logged`,color:C.text}].map(({label,val,color})=>(<div key={label} style={{flex:1,textAlign:"center"}}><div style={{fontSize:9,color:C.faint,letterSpacing:1,textTransform:"uppercase"}}>{label}</div><div style={{fontSize:13,fontWeight:800,color,marginTop:3}}>{val}</div></div>))}
        </div>
      </Card>
      <SLabel>Quick Add</SLabel>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {PRESETS.map(p=>(<button key={p.name} onClick={()=>addMeal(p)} style={{flex:"1 1 auto",minWidth:100,background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"10px 8px",cursor:"pointer",color:C.text,textAlign:"left",fontFamily:"inherit"}}><div style={{fontSize:18,marginBottom:3}}>{p.emoji}</div><div style={{fontSize:10,fontWeight:700,lineHeight:1.3}}>{p.name}</div><div style={{fontSize:9,color:C.faint,marginTop:2}}>{p.calories} kcal · {p.protein}g P</div></button>))}
        <button onClick={()=>setShowTargets(true)} style={{width:56,background:C.card,border:`1px solid ${C.border}`,borderRadius:14,cursor:"pointer",color:C.muted,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}><span style={{fontSize:18}}>🎯</span><span style={{fontSize:9,fontWeight:700}}>Goals</span></button>
      </div>
      <SLabel>Logged ({meals.length})</SLabel>
      {loading&&<div style={{textAlign:"center",padding:"20px 0",color:C.faint}}>Loading...</div>}
      {!loading&&meals.length===0&&<div style={{textAlign:"center",padding:"24px 0",color:C.faint,fontSize:13}}>Nothing logged yet</div>}
      {meals.map(m=>(<Card key={m.id} style={{marginBottom:8,padding:"12px 14px"}}><div style={{display:"flex",alignItems:"flex-start",gap:10}}><span style={{fontSize:18,marginTop:1}}>{m.data?.emoji||"🍽️"}</span><div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{m.data?.name||"Meal"}</div><div style={{fontSize:11,color:C.faint,marginTop:2}}>{Math.round(m.data?.calories||0)} kcal · {m.data?.protein||0}g P · {m.data?.carbs||0}g C · {m.data?.fat||0}g F</div>{m.data?.breakdown&&<div style={{fontSize:10,color:C.faint,marginTop:3,fontStyle:"italic"}}>{m.data.breakdown}</div>}</div><button onClick={()=>delMeal(m.id)} style={{background:"none",border:"none",color:C.faint,fontSize:18,cursor:"pointer",padding:"0 4px"}}>×</button></div></Card>))}
      <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",zIndex:50}}><Btn onClick={()=>{setShowInput(true);setResult(null);setInputText("");setError("");}}>+ Log Meal</Btn></div>
      {showInput&&(<Modal onClose={()=>setShowInput(false)} title="What did you eat?" subtitle="Type or speak naturally — I'll calculate everything"><div style={{position:"relative",marginBottom:12}}><textarea value={inputText} onChange={e=>{setInputText(e.target.value);setResult(null);}} placeholder='e.g. "150g chicken breast, 200g rice, tablespoon olive oil"' rows={3} style={{width:"100%",background:"#1a2332",border:`1.5px solid ${isListening?C.accent:C.border}`,borderRadius:12,padding:"12px 48px 12px 14px",color:C.text,fontSize:14,outline:"none",resize:"none",boxSizing:"border-box",fontFamily:"inherit"}}/><button onClick={isListening?stopVoice:startVoice} style={{position:"absolute",right:10,top:10,width:32,height:32,background:isListening?C.accent:C.border,border:"none",borderRadius:99,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:isListening?`0 0 12px ${C.accent}88`:"none"}}>🎤</button></div>{isListening&&<div style={{textAlign:"center",color:C.accent,fontSize:12,marginBottom:8}}>🔴 Listening... tap mic to stop</div>}{error&&<div style={{color:C.red,fontSize:12,marginBottom:10,textAlign:"center"}}>{error}</div>}{result&&(<div style={{background:C.bg,borderRadius:12,padding:14,marginBottom:12,border:`1px solid ${C.accent}33`}}><div style={{fontWeight:700,fontSize:13,color:C.accent,marginBottom:8}}>{result.name}</div><div style={{display:"flex",gap:8,marginBottom:8}}>{[["Kcal",Math.round(result.calories),C.text],["Protein",`${result.protein}g`,C.accent],["Carbs",`${result.carbs}g`,C.amber],["Fat",`${result.fat}g`,C.purple]].map(([l,v,c])=>(<div key={l} style={{flex:1,textAlign:"center",background:C.card,borderRadius:8,padding:"7px 4px"}}><div style={{fontSize:13,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:9,color:C.faint,marginTop:2,textTransform:"uppercase",letterSpacing:1}}>{l}</div></div>))}</div>{result.breakdown&&<div style={{fontSize:11,color:C.faint,fontStyle:"italic"}}>{result.breakdown}</div>}</div>)}<div style={{display:"flex",gap:10}}>{!result?(<Btn onClick={handleCalc} disabled={!inputText.trim()||isCalc} style={{flex:1}}>{isCalc?"Calculating...":"Calculate"}</Btn>):(<><Btn variant="ghost" onClick={()=>{setResult(null);setInputText("");}} style={{flex:1}}>Redo</Btn><Btn onClick={handleConfirm} style={{flex:2}}>✓ Log It</Btn></>)}</div></Modal>)}
      {showTargets&&(<Modal onClose={()=>setShowTargets(false)} title="Daily Targets" subtitle="Training days: carbs up. Rest days: carbs down. Protein always 180g+">{[["calories","Calories (kcal)"],["protein","Protein (g)"],["carbs","Carbs (g)"],["fat","Fat (g)"]].map(([key,label])=>(<div key={key} style={{marginBottom:12}}><div style={{fontSize:10,color:C.faint,letterSpacing:1.5,textTransform:"uppercase",marginBottom:5,fontWeight:700}}>{label}</div><input type="number" value={editTargets[key]} onChange={e=>setEditTargets({...editTargets,[key]:parseInt(e.target.value)||0})} style={{width:"100%",background:"#1a2332",border:`1px solid ${C.border}`,borderRadius:10,padding:"11px 13px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box"}}/></div>))}<Btn style={{width:"100%",marginTop:8}} onClick={()=>{setTargets(editTargets);localStorage.setItem("targets",JSON.stringify(editTargets));setShowTargets(false);}}>Save Targets</Btn></Modal>)}
    </div>
  );
}

function TrainingTab({startDate}){
  const [sessions,setSessions]=useState([]);
  const [loading,setLoading]=useState(true);
  const [activeSession,setActiveSession]=useState(null);
  const [loggedSets,setLoggedSets]=useState({});
  const [saving,setSaving]=useState(false);
  const [selectedWeek,setSelectedWeek]=useState(null);
  const week=getProgrammeWeek(startDate);
  const todaySession=startDate?getTodaySession(startDate):null;
  useEffect(()=>{(async()=>{try{const d=await sbGet("sessions");setSessions(d||[]);}catch{}setLoading(false);})();},[]);
  const startWorkout=(session,weekNum)=>{const phaseNum=weekNum<=2?1:weekNum<=4?2:3;const phaseKey=`phase${phaseNum}`;const exercises=session.exercises||SESSIONS[session.key]?.[phaseKey]||[];setActiveSession({...session,exercises,week:weekNum,phase:phaseNum});setLoggedSets({});};
  const logSet=(exName,si,field,val)=>{setLoggedSets(prev=>({...prev,[exName]:{...(prev[exName]||{}),[si]:{...(prev[exName]?.[si]||{}),[field]:val}}}));};
  const finishWorkout=async()=>{setSaving(true);try{const d=await sbPost("sessions",{date:getTodayKey(),data:{workout:activeSession.name,sets:loggedSets,week:activeSession.week,phase:activeSession.phase}});if(d)setSessions(p=>[...(Array.isArray(d)?d:[d]),...p]);}catch{}setSaving(false);setActiveSession(null);};
  if(activeSession){
    return(<div style={{paddingBottom:100}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div><div style={{fontSize:10,color:C.accent,fontWeight:700,letterSpacing:2,textTransform:"uppercase"}}>Week {activeSession.week} · Phase {activeSession.phase}</div><div style={{fontSize:20,fontWeight:800}}>{activeSession.emoji} {activeSession.name}</div><div style={{fontSize:12,color:C.muted}}>{activeSession.subtitle||""}</div></div>
        <Btn variant="ghost" onClick={()=>setActiveSession(null)} style={{padding:"8px 14px",fontSize:12}}>✕ Cancel</Btn>
      </div>
      {activeSession.type==="cardio"?(<Card><div style={{fontSize:14,fontWeight:700,marginBottom:8}}>{activeSession.name}</div><div style={{fontSize:12,color:C.accent,marginBottom:8}}>⏱ {activeSession.duration}</div><div style={{fontSize:12,color:C.muted,lineHeight:1.6}}>{activeSession.notes}</div></Card>):(activeSession.exercises.map((ex,ei)=>(<Card key={ei} style={{marginBottom:12}}><div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{ex.name}</div><div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}><span style={{fontSize:11,color:C.accent,background:`${C.accent}22`,padding:"2px 8px",borderRadius:99}}>{ex.sets} sets × {ex.reps}</span>{ex.rpe!=="-"&&<span style={{fontSize:11,color:C.amber,background:`${C.amber}22`,padding:"2px 8px",borderRadius:99}}>RPE {ex.rpe}</span>}</div>{ex.notes&&<div style={{fontSize:10,color:C.faint,marginBottom:10,fontStyle:"italic",lineHeight:1.5}}>{ex.notes}</div>}{Array.from({length:ex.sets}).map((_,si)=>{const logged=loggedSets[ex.name]?.[si]||{};const done=logged.weight||logged.reps;return(<div key={si} style={{display:"flex",gap:8,marginBottom:6,alignItems:"center"}}><div style={{fontSize:11,color:C.faint,width:42}}>Set {si+1}</div><input placeholder="kg" type="number" defaultValue={logged.weight} onChange={e=>logSet(ex.name,si,"weight",e.target.value)} style={{flex:1,background:"#1a2332",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13,outline:"none",fontFamily:"inherit"}}/><input placeholder="reps" type="number" defaultValue={logged.reps} onChange={e=>logSet(ex.name,si,"reps",e.target.value)} style={{flex:1,background:"#1a2332",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13,outline:"none",fontFamily:"inherit"}}/><div style={{fontSize:16,color:done?C.accent:C.faint,width:20,textAlign:"center"}}>{done?"✓":"○"}</div></div>);})}</Card>)))}
      <Btn onClick={finishWorkout} disabled={saving} style={{width:"100%",padding:16,fontSize:15,marginTop:8}}>{saving?"Saving...":"✓ Complete Session"}</Btn>
    </div>);
  }
  const weeks=Array.from({length:6},(_,i)=>i+1);
  const phaseLabel=w=>w<=2?"Phase 1: Foundation":w<=4?"Phase 2: Fat Loss Push":"Phase 3: Performance";
  const phaseColor=w=>w<=2?C.blue:w<=4?C.amber:C.accent;
  return(<div>
    {todaySession&&(<Card style={{marginBottom:16,borderColor:`${C.accent}44`}}><div style={{fontSize:10,color:C.accent,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>Today · Week {week}</div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontSize:18,fontWeight:800}}>{todaySession.emoji} {todaySession.name}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{todaySession.subtitle||todaySession.duration||""}</div></div>{todaySession.type!=="rest"&&(<Btn onClick={()=>startWorkout({...todaySession,key:todaySession.type==="cardio"?null:todaySession.name==="Strength A"?"A":todaySession.name==="Strength B"?"B":"C"},week)} style={{padding:"10px 18px"}}>Start</Btn>)}</div>{todaySession.notes&&<div style={{fontSize:11,color:C.faint,marginTop:8,fontStyle:"italic",lineHeight:1.5}}>{todaySession.notes}</div>}</Card>)}
    {!startDate&&(<Card style={{marginBottom:16,textAlign:"center"}}><div style={{fontSize:13,color:C.faint}}>Set your programme start date in Settings to see today's session</div></Card>)}
    <SLabel>6-Week Programme</SLabel>
    {weeks.map(w=>(<div key={w} style={{marginBottom:8}}>
      <button onClick={()=>setSelectedWeek(selectedWeek===w?null:w)} style={{width:"100%",background:C.card,border:`1px solid ${selectedWeek===w?phaseColor(w):C.border}`,borderRadius:14,padding:"14px 16px",cursor:"pointer",color:C.text,textAlign:"left",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontSize:10,color:phaseColor(w),fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:2}}>{phaseLabel(w)}</div><div style={{fontSize:15,fontWeight:800}}>Week {w}</div></div>
        <span style={{color:C.faint,fontSize:18}}>{selectedWeek===w?"▲":"▼"}</span>
      </button>
      {selectedWeek===w&&(<div style={{background:"#0d1420",borderRadius:"0 0 14px 14px",border:`1px solid ${C.border}`,borderTop:"none",padding:12}}>
        {[{key:"A",day:"Mon",emoji:"🏋️",name:"Strength A",subtitle:"Lower / Full Body"},{key:"B",day:"Wed",emoji:"💪",name:"Strength B",subtitle:"Lower / Posterior"},{key:"C",day:"Thu",emoji:"🔱",name:"Strength C",subtitle:"Upper / Push"},...CARDIO_SESSIONS.filter(s=>s.week===w).map(s=>({...s,key:null}))].map((s,i)=>(<div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 8px",borderBottom:`1px solid ${C.border}`}}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{fontSize:20,width:28,textAlign:"center"}}>{s.emoji}</div><div><div style={{fontSize:12,fontWeight:700}}>{s.name}</div><div style={{fontSize:10,color:C.faint}}>{s.day||""} {s.subtitle||s.duration||""}</div></div></div>{s.key&&(<Btn onClick={()=>startWorkout({...SESSIONS[s.key],exercises:SESSIONS[s.key][`phase${w<=2?1:w<=4?2:3}`],name:s.name,subtitle:s.subtitle,emoji:s.emoji,type:"strength",key:s.key},w)} style={{padding:"6px 14px",fontSize:11}}>Start</Btn>)}</div>))}
      </div>)}
    </div>))}
  </div>);
}

function StatsTab(){
  const [stats,setStats]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({weight:"",body_fat:"",muscle_mass:""});
  useEffect(()=>{(async()=>{try{const d=await sbGet("stats");setStats(d||[]);}catch{}setLoading(false);})();},[]);
  const addStat=async()=>{if(!form.weight)return;try{const r=await sbPost("stats",{date:getTodayKey(),...form});if(r)setStats(p=>[...(Array.isArray(r)?r:[r]),...p]);}catch{}setForm({weight:"",body_fat:"",muscle_mass:""});setShowAdd(false);};
  const delStat=async id=>{await sbDelete("stats",`id=eq.${id}`);setStats(p=>p.filter(s=>s.id!==id));};
  const latest=stats[0],prev=stats[1];
  const delta=k=>{if(!latest?.[k]||!prev?.[k])return null;return(parseFloat(latest[k])-parseFloat(prev[k])).toFixed(1);};
  const WEEKLY_TARGETS=[{week:"Week 1",date:"Mon 21 Apr",target:"0.8-1.2 kg",cumulative:"0.8-1.2 kg"},{week:"Week 2",date:"Mon 28 Apr",target:"0.8-1.2 kg",cumulative:"1.6-2.4 kg"},{week:"Week 3",date:"Mon 5 May",target:"0.7-1.0 kg",cumulative:"2.3-3.4 kg"},{week:"Week 4",date:"Mon 12 May",target:"0.7-1.0 kg",cumulative:"3.0-4.4 kg"},{week:"Week 5",date:"Mon 19 May",target:"0.7-1.0 kg",cumulative:"3.7-5.4 kg"},{week:"Week 6",date:"Sun 25 May",target:"0.7-1.0 kg",cumulative:"4.4-6.4 kg"}];
  return(<div>
    {latest&&(<Card style={{marginBottom:16}}><div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:12}}>Latest — {latest.date}</div><div style={{display:"flex",gap:10}}>{[["weight","Weight","kg",true],["body_fat","Body Fat","%",true],["muscle_mass","Muscle","kg",false]].map(([k,label,unit,invert])=>latest[k]?(<div key={k} style={{flex:1,background:C.bg,borderRadius:12,padding:"12px 8px",textAlign:"center"}}><div style={{fontSize:18,fontWeight:800}}>{latest[k]}<span style={{fontSize:11,color:C.faint}}>{unit}</span></div><div style={{fontSize:10,color:C.faint,marginTop:2,textTransform:"uppercase",letterSpacing:1}}>{label}</div>{delta(k)!==null&&(<div style={{fontSize:11,marginTop:2,color:(invert?parseFloat(delta(k))<0:parseFloat(delta(k))>0)?C.accent:C.red}}>{parseFloat(delta(k))>0?"+":""}{delta(k)}</div>)}</div>):null)}</div></Card>)}
    <Card style={{marginBottom:16}}><div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:12}}>Weekly Targets — Target: 5-7kg total</div>{WEEKLY_TARGETS.map(t=>(<div key={t.week} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div><div style={{fontSize:12,fontWeight:700}}>{t.week}</div><div style={{fontSize:10,color:C.faint}}>{t.date}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:12,color:C.accent,fontWeight:700}}>{t.target}</div><div style={{fontSize:10,color:C.faint}}>Total: {t.cumulative}</div></div></div>))}</Card>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><SLabel>History</SLabel><Btn onClick={()=>setShowAdd(true)} style={{padding:"8px 14px",fontSize:12}}>+ Log Stats</Btn></div>
    {loading&&<div style={{textAlign:"center",padding:"20px 0",color:C.faint}}>Loading...</div>}
    {!loading&&stats.length===0&&<div style={{textAlign:"center",padding:"24px 0",color:C.faint,fontSize:13}}>No stats logged yet — weigh in every Monday morning, fasted</div>}
    {stats.slice(0,20).map(s=>(<Card key={s.id} style={{marginBottom:8,padding:"12px 14px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:C.muted}}>{s.date}</span><div style={{display:"flex",gap:12,alignItems:"center"}}>{s.weight&&<span style={{fontSize:13,fontWeight:700}}>{s.weight}kg</span>}{s.body_fat&&<span style={{fontSize:12,color:C.amber}}>{s.body_fat}% BF</span>}{s.muscle_mass&&<span style={{fontSize:12,color:C.accent}}>{s.muscle_mass}kg M</span>}<button onClick={()=>delStat(s.id)} style={{background:"none",border:"none",color:C.faint,fontSize:16,cursor:"pointer"}}>×</button></div></div></Card>))}
    {showAdd&&(<Modal onClose={()=>setShowAdd(false)} title="Log Body Stats" subtitle="Monday morning · fasted · same conditions every week">{[["weight","Weight (kg)"],["body_fat","Body Fat (%)"],["muscle_mass","Muscle Mass (kg)"]].map(([key,label])=>(<div key={key} style={{marginBottom:12}}><div style={{fontSize:10,color:C.faint,letterSpacing:1.5,textTransform:"uppercase",marginBottom:5,fontWeight:700}}>{label}</div><input type="number" step="0.1" value={form[key]} placeholder="0.0" onChange={e=>setForm({...form,[key]:e.target.value})} style={{width:"100%",background:"#1a2332",border:`1px solid ${C.border}`,borderRadius:10,padding:"11px 13px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box"}}/></div>))}<Btn onClick={addStat} style={{width:"100%",marginTop:8}} disabled={!form.weight}>Save Entry</Btn></Modal>)}
  </div>);
}

function WaterTab(){
  const [water,setWater]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{(async()=>{try{const d=await sbGet("water",`&date=eq.${getTodayKey()}`);setWater(d||[]);}catch{}setLoading(false);})();},[]);
  const todayRecord=water[0];const todayMl=todayRecord?.amount_ml||0;const pct=Math.min(todayMl/WATER_GOAL,1);
  const add=async ml=>{const newMl=todayMl+ml;if(todayRecord){await sbPatch("water",`id=eq.${todayRecord.id}`,{amount_ml:newMl});setWater([{...todayRecord,amount_ml:newMl}]);}else{const r=await sbPost("water",{date:getTodayKey(),amount_ml:newMl});if(r)setWater(Array.isArray(r)?r:[r]);}};
  const reset=async()=>{if(todayRecord){await sbPatch("water",`id=eq.${todayRecord.id}`,{amount_ml:0});setWater([{...todayRecord,amount_ml:0}]);}};
  return(<div>
    <Card style={{marginBottom:16,textAlign:"center"}}><div style={{position:"relative",width:160,height:160,margin:"0 auto 16px"}}><svg width="160" height="160" style={{transform:"rotate(-90deg)"}}><circle cx="80" cy="80" r="68" fill="none" stroke={C.border} strokeWidth="10"/><circle cx="80" cy="80" r="68" fill="none" stroke={C.blue} strokeWidth="10" strokeDasharray={`${pct*2*Math.PI*68} ${2*Math.PI*68}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.5s",filter:`drop-shadow(0 0 6px ${C.blue})`}}/></svg><div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:32}}>💧</div><div style={{fontSize:24,fontWeight:800,color:C.blue,lineHeight:1}}>{todayMl}ml</div><div style={{fontSize:10,color:C.faint}}>/ {WATER_GOAL}ml goal</div></div></div><div style={{fontSize:13,color:pct>=1?C.accent:C.muted,fontWeight:700}}>{pct>=1?"🎉 Goal hit!":`${WATER_GOAL-todayMl}ml remaining`}</div></Card>
    <SLabel>Quick Add</SLabel>
    <div style={{display:"flex",gap:8,marginBottom:16}}>{[150,250,330,500,750].map(ml=>(<button key={ml} onClick={()=>add(ml)} style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 4px",cursor:"pointer",color:C.text,fontFamily:"inherit",textAlign:"center"}}><div style={{fontSize:16}}>🥤</div><div style={{fontSize:11,fontWeight:700,marginTop:3}}>{ml}ml</div></button>))}</div>
    <div style={{display:"flex",gap:10}}><Btn onClick={()=>add(250)} style={{flex:1}}>+ 250ml</Btn><Btn variant="ghost" onClick={reset} style={{flex:1}}>Reset</Btn></div>
  </div>);
}

function ProgressTab(){
  const [stats,setStats]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{(async()=>{try{const d=await sbGet("stats");setStats(d||[]);}catch{}setLoading(false);})();},[]);
  const start=stats.length>0?parseFloat(stats[stats.length-1].weight):null;
  const current=stats.length>0?parseFloat(stats[0].weight):null;
  const totalChange=start&&current?(start-current).toFixed(1):null;
  const startBF=stats.length>0?parseFloat(stats[stats.length-1].body_fat):null;
  const currentBF=stats.length>0?parseFloat(stats[0].body_fat):null;
  const bfChange=startBF&&currentBF?(startBF-currentBF).toFixed(1):null;
  const startM=stats.length>0?parseFloat(stats[stats.length-1].muscle_mass):null;
  const currentM=stats.length>0?parseFloat(stats[0].muscle_mass):null;
  const muscleChange=startM&&currentM?(currentM-startM).toFixed(1):null;
  return(<div>
    {totalChange!==null&&(<div style={{display:"flex",gap:10,marginBottom:16}}>{[{label:"Weight Lost",val:`${parseFloat(totalChange)>0?"-":"+"}${Math.abs(parseFloat(totalChange))}kg`,color:parseFloat(totalChange)>0?C.accent:C.red},{label:"BF Change",val:bfChange?`${parseFloat(bfChange)>0?"-":"+"}${Math.abs(parseFloat(bfChange))}%`:"—",color:parseFloat(bfChange)>0?C.accent:C.red},{label:"Muscle",val:muscleChange?`${parseFloat(muscleChange)>0?"+":""}${muscleChange}kg`:"—",color:parseFloat(muscleChange)>0?C.accent:C.red}].map(({label,val,color})=>(<Card key={label} style={{flex:1,padding:"14px 10px",textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color}}>{val}</div><div style={{fontSize:9,color:C.faint,marginTop:3,textTransform:"uppercase",letterSpacing:1}}>{label}</div></Card>))}</div>)}
    <SLabel>Weight Trend</SLabel>
    {loading&&<div style={{textAlign:"center",padding:"20px 0",color:C.faint}}>Loading...</div>}
    {!loading&&stats.length<2&&<div style={{textAlign:"center",padding:"20px 0",color:C.faint,fontSize:13}}>Log at least 2 weigh-ins to see your trend</div>}
    {stats.length>=2&&(<Card style={{marginBottom:16}}>{stats.slice(0,8).slice().reverse().map(s=>{const arr=stats.slice(0,8);const min=Math.min(...arr.map(x=>parseFloat(x.weight)));const max=Math.max(...arr.map(x=>parseFloat(x.weight)));const p=((parseFloat(s.weight)-min)/(max-min||1))*100;return(<div key={s.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><div style={{fontSize:10,color:C.muted,width:80}}>{s.date}</div><div style={{flex:1,height:6,background:C.border,borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.max(p,5)}%`,background:C.accent,borderRadius:99}}/></div><div style={{fontSize:12,fontWeight:700,width:52,textAlign:"right"}}>{s.weight}kg</div></div>);})}</Card>)}
    <SLabel>Full History</SLabel>
    {stats.map(s=>(<Card key={s.id} style={{marginBottom:8,padding:"12px 14px"}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,color:C.muted,fontWeight:700}}>{s.date}</span><div style={{display:"flex",gap:12}}>{s.weight&&<div><span style={{fontSize:14,fontWeight:800}}>{s.weight}</span><span style={{fontSize:10,color:C.faint}}>kg</span></div>}{s.body_fat&&<div><span style={{fontSize:14,fontWeight:800,color:C.amber}}>{s.body_fat}</span><span style={{fontSize:10,color:C.faint}}>% BF</span></div>}{s.muscle_mass&&<div><span style={{fontSize:14,fontWeight:800,color:C.accent}}>{s.muscle_mass}</span><span style={{fontSize:10,color:C.faint}}>kg M</span></div>}</div></div></Card>))}
    {!loading&&stats.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:C.faint,fontSize:13}}>Log your stats to track progress</div>}
  </div>);
}

function SettingsTab({startDate,setStartDate}){
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("api-key")||"");
  const [saved,setSaved]=useState(false);
  const save=()=>{localStorage.setItem("api-key",apiKey);if(startDate)localStorage.setItem(START_KEY,startDate);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  return(<div>
    <Card style={{marginBottom:16}}><div style={{fontSize:14,fontWeight:800,marginBottom:4}}>Programme Start Date</div><div style={{fontSize:12,color:C.faint,marginBottom:12}}>Sets which week you're on and shows today's session</div><input type="date" value={startDate||""} onChange={e=>setStartDate(e.target.value)} style={{width:"100%",background:"#1a2332",border:`1px solid ${C.border}`,borderRadius:10,padding:"11px 13px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box"}}/>{startDate&&(<div style={{marginTop:10,fontSize:13,color:C.accent,fontWeight:700}}>Currently: Week {getProgrammeWeek(startDate)||"outside programme"} of 6</div>)}</Card>
    <Card style={{marginBottom:16}}><div style={{fontSize:14,fontWeight:800,marginBottom:4}}>Anthropic API Key</div><div style={{fontSize:12,color:C.faint,marginBottom:12}}>Required for AI meal calculation. Get yours at console.anthropic.com — stored locally on your device only.</div><input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." style={{width:"100%",background:"#1a2332",border:`1px solid ${C.border}`,borderRadius:10,padding:"11px 13px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box"}}/></Card>
    <Btn onClick={save} style={{width:"100%",padding:16}}>{saved?"✓ Saved!":"Save Settings"}</Btn>
    <Card style={{marginTop:16}}><div style={{fontSize:12,fontWeight:800,marginBottom:10,color:C.accent}}>Programme Summary</div><div style={{fontSize:12,color:C.muted,lineHeight:1.8}}><div>📅 14 April – 25 May 2025</div><div>🎯 Target: 5–7kg loss (103–105kg)</div><div>💪 Strength: Mon / Wed / Thu</div><div>🚴 Cardio: Tue / Fri / Sat</div><div>😴 Recovery: Sun (+ Fri in early weeks)</div><div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`}}><div style={{color:C.text,fontWeight:700,marginBottom:4}}>Macros</div><div>Calories: 2,300 kcal</div><div>Protein: 180g · Carbs: 200g · Fat: 75g</div></div><div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`}}><div style={{color:C.text,fontWeight:700,marginBottom:4}}>Daily Supplements</div><div>Creatine: 5g with Meal 1</div><div>Vitamin D: with fat-containing meal</div></div></div></Card>
  </div>);
}

const TABS=[{id:"nutrition",label:"Nutrition",icon:"🍽️"},{id:"training",label:"Training",icon:"🏋️"},{id:"stats",label:"Stats",icon:"📊"},{id:"water",label:"Water",icon:"💧"},{id:"progress",label:"Progress",icon:"📈"},{id:"settings",label:"Settings",icon:"⚙️"}];

function App(){
  const [tab,setTab]=useState("training");
  const [targets,setTargets]=useState(()=>{try{return JSON.parse(localStorage.getItem("targets")||"null")||DEFAULT_TARGETS;}catch{return DEFAULT_TARGETS;}});
  const [startDate,setStartDate]=useState(()=>localStorage.getItem(START_KEY)||"");
  const [showWelcome,setShowWelcome]=useState(()=>!localStorage.getItem("api-key"));
  const saveStartDate=d=>{setStartDate(d);localStorage.setItem(START_KEY,d);};
  if(showWelcome){return <WelcomeScreen onDone={(key,date)=>{localStorage.setItem("api-key",key);if(date){localStorage.setItem(START_KEY,date);setStartDate(date);}setShowWelcome(false);}}/>;}
  return(<div style={{minHeight:"100vh",background:C.bg,color:C.text,paddingBottom:80}}>
    <div style={{padding:"20px 18px 12px",borderBottom:`1px solid ${C.border}`}}><div style={{fontSize:10,letterSpacing:3,color:C.accent,fontWeight:700,textTransform:"uppercase"}}>6 Week Banger</div><div style={{fontSize:20,fontWeight:800,marginTop:2}}>{TABS.find(t=>t.id===tab)?.icon} {TABS.find(t=>t.id===tab)?.label}{startDate&&tab==="training"&&<span style={{fontSize:11,color:C.faint,fontWeight:400,marginLeft:8}}>Week {getProgrammeWeek(startDate)||"—"} of 6</span>}</div></div>
    <div style={{padding:"16px 18px"}}>
      {tab==="nutrition"&&<NutritionTab targets={targets} setTargets={setTargets}/>}
      {tab==="training"&&<TrainingTab startDate={startDate}/>}
      {tab==="stats"&&<StatsTab/>}
      {tab==="water"&&<WaterTab/>}
      {tab==="progress"&&<ProgressTab/>}
      {tab==="settings"&&<SettingsTab startDate={startDate} setStartDate={saveStartDate}/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
      {TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"10px 2px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontFamily:"inherit"}}><span style={{fontSize:18,filter:tab===t.id?"none":"grayscale(1) opacity(0.4)"}}>{t.icon}</span><span style={{fontSize:8,fontWeight:700,letterSpacing:0.5,color:tab===t.id?C.accent:C.faint,textTransform:"uppercase"}}>{t.label}</span></button>))}
    </div>
  </div>);
}

function WelcomeScreen({onDone}){
  const [key,setKey]=useState("");
  const [date,setDate]=useState(getTodayKey());
  return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{fontSize:48,marginBottom:16}}>💪</div>
    <div style={{fontSize:10,color:C.accent,fontWeight:700,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>6 Week Banger</div>
    <div style={{fontSize:24,fontWeight:800,marginBottom:8}}>Let's Go</div>
    <div style={{fontSize:13,color:C.muted,textAlign:"center",marginBottom:32,lineHeight:1.6,maxWidth:320}}>Your full 6-week training and nutrition plan is loaded. Enter your API key for AI meal calculation and set your start date.</div>
    <div style={{width:"100%",maxWidth:400,marginBottom:16}}><div style={{fontSize:10,color:C.faint,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6,fontWeight:700}}>Anthropic API Key</div><input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-..." style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box"}}/><div style={{fontSize:10,color:C.faint,marginTop:6}}>Get yours at console.anthropic.com — stored locally only</div></div>
    <div style={{width:"100%",maxWidth:400,marginBottom:24}}><div style={{fontSize:10,color:C.faint,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6,fontWeight:700}}>Programme Start Date</div><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box"}}/></div>
    <Btn onClick={()=>onDone(key,date)} disabled={!key.startsWith("sk-")} style={{width:"100%",maxWidth:400,padding:16}}>Get Started</Btn>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
